# Active production fragment for https://tazy.pro/.
# Keep Let's Encrypt certificate paths domain-specific; do not reuse tazy.dog certs.
server {
  listen 80;
  listen [::]:80;
  server_name tazy.pro www.tazy.pro;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://tazy.pro$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name tazy.pro www.tazy.pro;

  ssl_certificate /etc/letsencrypt/live/tazy.pro/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tazy.pro/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  include /etc/nginx/snippets/qdev-public-analytics-suite.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  if ($host = www.tazy.pro) {
    return 301 https://tazy.pro$request_uri;
  }

  root /var/www/tazy.pro/current;
  index index.html;
  client_max_body_size 10M;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com https://cm.g.doubleclick.net https://mc.yandex.ru https://yandex.ru https://c.clarity.ms; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://mc.yandex.ru https://www.clarity.ms https://scripts.clarity.ms; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://mc.yandex.ru wss://mc.yandex.ru https://*.clarity.ms; frame-src https://mc.yandex.ru; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

  location ~* \.(?:css|js|mjs)$ {
    try_files $uri =404;
    expires off;
    add_header Cache-Control "no-cache" always;
  }

  location ~* \.(?:png|jpg|jpeg|gif|svg|webp|ico)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

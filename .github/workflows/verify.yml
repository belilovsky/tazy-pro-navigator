name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run static checks
        run: ./scripts/check.sh

      - name: Build static bundle
        run: node scripts/build-static.mjs
